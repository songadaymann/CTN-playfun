<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phaser Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="x-ogp-key" content="64ee7b61-3b07-437b-bcea-565ee94a0ddc" id="ogp-key-meta" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script> <!-- Phaser 3 library -->
    <script src="https://sdk.play.fun"></script> <!-- Play.fun SDK -->
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; } /* Basic styling */
        canvas { display: block; }
        .touch-controls {
            position: fixed;
            bottom: 20px;
            left: 0; /* Align to left edge */
            right: 0; /* Align to right edge */
            width: 100%;
            display: flex; /* Use flexbox to position D-pad and action buttons */
            justify-content: space-between; /* Space D-pad left, action buttons right */
            align-items: flex-end; /* Align items to the bottom of the flex container */
            padding: 0 20px; /* Add some padding on the sides */
            box-sizing: border-box; /* Include padding in width calculation */
            pointer-events: none; /* Allow clicks to pass through the container itself */
        }
        .touch-controls button {
            width: 48px;
            height: 48px;
            opacity: 0.6;
            font-size: 24px;
            background-color: rgba(100, 100, 100, 0.7);
            /* Prevent text selection/callout on tap */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE/Edge */
            user-select: none;         /* Standard */
            -webkit-touch-callout: none; /* Disable callouts (like copy/paste) on iOS */
        }
        .touch-controls .mid-row {
            display: flex;
            justify-content: space-between;
        }
        .dpad-container, .action-buttons-container {
            pointer-events: all; /* Buttons should capture pointer events */
            display: flex;
            flex-direction: column; /* Stack buttons vertically if needed, or align them */
            align-items: center; /* Center buttons if stacked */
        }
        .dpad-container button {
            /* Styles from .touch-controls button will apply or can be overridden here */
        }
        .dpad-middle-row {
            display: flex;
        }
        .action-buttons-container button {
            /* Styles from .touch-controls button will apply */
            /* Example: make action button visually distinct if desired */
             background-color: #ff4136; /* A red-ish color for action */
        }
    </style>
    <!-- Load Component Classes -->
    <script>window.APPLY_BODY_DEBUG = false;</script>
    <script src="js/utils/deviceUtils.js?v=3"></script>
    <script src="js/utils/physicsUtils.js?v=3"></script>
